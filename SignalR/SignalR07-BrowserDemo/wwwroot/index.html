<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignalR Browser Demo</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #f7f2e8 0%, #d8e7f5 100%);
      --panel: rgba(255, 255, 255, 0.86);
      --ink: #16212d;
      --muted: #58708b;
      --accent: #d96c3d;
      --accent-2: #235789;
      --line: rgba(22, 33, 45, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background: var(--bg);
      min-height: 100vh;
    }
    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      align-items: stretch;
    }
    .card {
      background: var(--panel);
      backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(36, 52, 71, 0.12);
    }
    .hero-main {
      padding: 28px;
    }
    .eyebrow {
      color: var(--accent-2);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 12px;
      margin-bottom: 12px;
    }
    h1 {
      font-size: clamp(32px, 6vw, 64px);
      line-height: 0.95;
      margin: 0 0 16px;
    }
    .hero p {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
      margin: 0;
    }
    .status-panel {
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #999;
      display: inline-block;
      margin-right: 8px;
      box-shadow: 0 0 0 6px rgba(0,0,0,0.03);
    }
    .status-dot.online { background: #1f9d55; }
    .status-dot.offline { background: #c44536; }
    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .controls, .messages { padding: 24px; }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--muted);
    }
    input, textarea, button {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--line);
      padding: 14px 16px;
      font-size: 16px;
      font-family: inherit;
    }
    textarea { min-height: 110px; resize: vertical; }
    .field { margin-bottom: 16px; }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }
    button {
      cursor: pointer;
      border: none;
      color: white;
      background: var(--accent);
      transition: transform 0.18s ease, opacity 0.18s ease;
    }
    button.secondary { background: var(--accent-2); }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .messages-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .log {
      min-height: 420px;
      max-height: 540px;
      overflow: auto;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.7);
      border: 1px dashed var(--line);
    }
    .entry {
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 10px;
      background: white;
      border: 1px solid rgba(0,0,0,0.06);
      animation: slideUp 0.24s ease;
    }
    .entry.system { background: #f5f8fc; }
    .meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .empty {
      color: var(--muted);
      font-style: italic;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 900px) {
      .hero, .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="card hero-main">
        <div class="eyebrow">SignalR Browser Demo</div>
        <h1>浏览器里直接看<br/>实时推送效果</h1>
        <p>这个页面和 SignalR Hub 在同一个 ASP.NET Core 项目中运行。点击连接后，打开多个浏览器标签页，就能看到广播消息同步出现。</p>
      </div>
      <aside class="card status-panel">
        <div>
          <div class="eyebrow">Connection</div>
          <div id="statusText"><span class="status-dot offline" id="statusDot"></span>未连接</div>
        </div>
        <div>
          <div class="eyebrow">Hub</div>
          <div>/hubs/live-chat</div>
        </div>
        <div>
          <div class="eyebrow">Tips</div>
          <div style="color: var(--muted); line-height: 1.6;">同时打开两个标签页，使用不同用户名发消息，最容易看出 SignalR 广播效果。</div>
        </div>
      </aside>
    </section>

    <section class="grid">
      <div class="card controls">
        <div class="field">
          <label for="userName">用户名</label>
          <input id="userName" value="alice" />
        </div>
        <div class="field">
          <label for="messageInput">消息内容</label>
          <textarea id="messageInput">hello signalr</textarea>
        </div>
        <div class="actions">
          <button id="connectBtn" class="secondary">连接</button>
          <button id="disconnectBtn">断开</button>
        </div>
        <div class="actions">
          <button id="sendBtn">发送消息</button>
          <button id="systemBtn" class="secondary">系统广播</button>
        </div>
      </div>

      <div class="card messages">
        <div class="messages-header">
          <div>
            <div class="eyebrow">Live Feed</div>
            <strong>消息流</strong>
          </div>
          <button id="clearBtn" class="secondary" style="width:auto;padding:10px 14px;">清空</button>
        </div>
        <div id="log" class="log">
          <div class="empty">还没有消息，先点击“连接”。</div>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js" crossorigin="anonymous"></script>
  <script>
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const sendBtn = document.getElementById('sendBtn');
    const systemBtn = document.getElementById('systemBtn');
    const clearBtn = document.getElementById('clearBtn');
    const userNameInput = document.getElementById('userName');
    const messageInput = document.getElementById('messageInput');
    const log = document.getElementById('log');

    let connection = null;

    function setStatus(connected, text) {
      statusText.innerHTML = '';
      statusDot.className = connected ? 'status-dot online' : 'status-dot offline';
      statusText.appendChild(statusDot);
      statusText.append(document.createTextNode(text));
    }

    function appendEntry(kind, title, message) {
      if (log.querySelector('.empty')) {
        log.innerHTML = '';
      }
      const item = document.createElement('div');
      item.className = `entry ${kind}`;
      item.innerHTML = `<div class="meta">${new Date().toLocaleTimeString()} · ${title}</div><div>${message}</div>`;
      log.prepend(item);
    }

    function ensureClientLoaded() {
      if (window.signalR) {
        return true;
      }

      appendEntry('system', 'system', 'SignalR 浏览器脚本未加载成功，请检查网络或 CDN 访问。');
      setStatus(false, '前端脚本加载失败');
      return false;
    }

    async function connect() {
      if (connection) {
        return;
      }

      if (!ensureClientLoaded()) {
        return;
      }

      connection = new signalR.HubConnectionBuilder()
        .withUrl('/hubs/live-chat')
        .withAutomaticReconnect()
        .build();

      connection.on('ReceiveMessage', (user, message) => {
        appendEntry('', user, message);
      });

      connection.on('ReceiveSystemMessage', (message) => {
        appendEntry('system', 'system', message);
      });

      connection.onreconnecting(() => setStatus(false, '重连中...'));
      connection.onreconnected(() => setStatus(true, '已连接（已重连）'));
      connection.onclose(() => {
        connection = null;
        setStatus(false, '连接已关闭');
      });

      await connection.start();
      setStatus(true, '已连接');
      appendEntry('system', 'system', '连接成功');
    }

    async function disconnect() {
      if (!connection) {
        return;
      }
      await connection.stop();
      connection = null;
      setStatus(false, '已断开');
      appendEntry('system', 'system', '已手动断开连接');
    }

    async function sendMessage() {
      if (!connection) {
        appendEntry('system', 'system', '请先连接再发送');
        return;
      }
      const user = userNameInput.value.trim() || 'anonymous';
      const message = messageInput.value.trim();
      if (!message) {
        appendEntry('system', 'system', '消息不能为空');
        return;
      }
      await connection.invoke('SendMessage', user, message);
      messageInput.value = '';
    }

    async function sendSystemMessage() {
      const message = messageInput.value.trim() || 'system broadcast';
      const response = await fetch(`/api/system-message?message=${encodeURIComponent(message)}`, {
        method: 'POST'
      });
      const result = await response.json();
      appendEntry('system', 'http', `system sent: ${result.message}`);
    }

    connectBtn.addEventListener('click', connect);
    disconnectBtn.addEventListener('click', disconnect);
    sendBtn.addEventListener('click', sendMessage);
    systemBtn.addEventListener('click', sendSystemMessage);
    clearBtn.addEventListener('click', () => {
      log.innerHTML = '<div class="empty">消息已清空。</div>';
    });

    setStatus(false, '未连接');
    ensureClientLoaded();
  </script>
</body>
</html>
